<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Lumina Realty</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body class="signup-page">

  <div class="signup-split">

    <!-- LEFT SIDE: visual panel with background image -->
    <div class="signup-visual">
      <img src="images/signup-hero.jpg" alt="" class="signup-visual-img">

      <div class="signup-visual-content">
        <h1>Lumina Realty</h1>
        <p>Precision in discovery. Exceptional spaces for the visionary mind.</p>
      </div>

      <span class="signup-visual-footer">Curated Excellence</span>
    </div>

    <!-- RIGHT SIDE: signup form -->
    <div class="signup-form-side">
      <div class="signup-form-inner">
        <h1>Create your account</h1>
        <p>Join our exclusive network of property visionaries.</p>

        <form action="login.html" id="signup-form">
          <p id="signup-error" style="display:none; color:#c0392b; font-size:13px; margin-bottom:14px;"></p>

          <label for="name">Full Name</label>
          <div class="input-with-icon">
            <input type="text" id="name" placeholder="Enter your full name" required>
          </div>

          <label for="email">Email Address</label>
          <div class="input-with-icon">
            <input type="email" id="email" placeholder="name@company.com" required>
          </div>

          <label for="password">Password</label>
          <div class="input-with-icon">
            <input type="password" id="password" placeholder="Min. 8 characters" required>
            <button type="button" class="toggle-visibility" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9a99a5" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <div style="margin-top: 28px;">
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
          </div>

          <div class="divider"><span>OR CONTINUE WITH</span></div>

          <button type="button" class="btn btn-outline btn-block">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
          </button>
        </form>

        <p class="auth-footer-link">Already have an account? <a href="login.html"><strong>Log in</strong></a></p>

        <div class="auth-footer" style="margin-top: 40px; justify-content: space-between;">
          <div class="auth-footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
          </div>
          <span>© 2026 Lumina Realty</span>
        </div>
      </div>
    </div>

  </div>

  <script src="js/script.js"></script>
  <button class="chat-fab" aria-label="Open AI Assistant">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  </button>

</body>
</html>
